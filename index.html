<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>かんじのもり</title>
  <meta name="description" content="小1〜小3の漢字440字で遊べるかるた＆ことばづくりゲーム" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="かんじのもり" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ホーム -->
  <section id="scr-home" class="screen active">
    <div class="home-inner">
      <h1 class="app-title"><span class="title-emoji">🦉</span>かんじのもり</h1>
      <p class="app-sub">かんじで あそぼう！</p>

      <div class="grade-chips" id="grade-chips">
        <button class="chip" data-grade="1">１ねんせい</button>
        <button class="chip" data-grade="2">２ねんせい</button>
        <button class="chip" data-grade="3">３ねんせい</button>
        <button class="chip" data-grade="all">ぜんぶ</button>
      </div>

      <nav class="mode-buttons">
        <button class="mode-btn karuta" id="btn-karuta">
          <span class="mode-emoji">🎴</span>
          <span class="mode-name">かるた</span>
          <span class="mode-desc">ひとりで じっくり</span>
        </button>
        <button class="mode-btn versus" id="btn-versus">
          <span class="mode-emoji">⚔️</span>
          <span class="mode-name">かるた たいせん</span>
          <span class="mode-desc">ふたりで はやおし！</span>
        </button>
        <button class="mode-btn kotoba" id="btn-kotoba">
          <span class="mode-emoji">🧩</span>
          <span class="mode-name">ことばづくり</span>
          <span class="mode-desc">かんじを あわせて ことばに</span>
        </button>
        <button class="mode-btn puzzle" id="btn-puzzle">
          <span class="mode-emoji">🀄</span>
          <span class="mode-name">かんじパズル</span>
          <span class="mode-desc">ばんに ならべて じゅくごバトル（2〜4人）</span>
        </button>
        <button class="mode-btn zukan" id="btn-zukan">
          <span class="mode-emoji">📖</span>
          <span class="mode-name">かんじずかん</span>
          <span class="mode-desc" id="zukan-progress">あつめた かんじ</span>
        </button>
      </nav>
      <p class="app-ver" id="app-ver">v5</p>
    </div>
  </section>

  <!-- かるた（ひとりで） -->
  <section id="scr-karuta" class="screen">
    <header class="game-header">
      <button class="back-btn" data-home>← もどる</button>
      <div class="progress" id="karuta-progress"></div>
    </header>
    <div class="clue-card" id="karuta-clue"></div>
    <div class="choices grid6" id="karuta-choices"></div>
  </section>

  <!-- かるた たいせん（ふたりで） -->
  <section id="scr-versus" class="screen">
    <header class="game-header">
      <button class="back-btn" data-home>← もどる</button>
      <div class="vs-scores">
        <span class="vs-score p1" id="vs-score1">0</span>
        <span class="vs-goal">さきに 5まい！</span>
        <span class="vs-score p2" id="vs-score2">0</span>
      </div>
    </header>
    <div class="clue-card compact" id="versus-clue"></div>
    <div class="vs-arena">
      <div class="vs-panel p1">
        <div class="vs-label">🌸 ひだりの ひと</div>
        <div class="choices grid4" id="versus-choices1"></div>
      </div>
      <div class="vs-divider"></div>
      <div class="vs-panel p2">
        <div class="vs-label">🐳 みぎの ひと</div>
        <div class="choices grid4" id="versus-choices2"></div>
      </div>
    </div>
  </section>

  <!-- ことばづくり -->
  <section id="scr-kotoba" class="screen">
    <header class="game-header">
      <button class="back-btn" data-home>← もどる</button>
      <div class="progress" id="kotoba-progress"></div>
    </header>
    <div class="clue-card" id="kotoba-clue"></div>
    <div class="kotoba-slots" id="kotoba-slots"></div>
    <div class="choices grid6" id="kotoba-tiles"></div>
  </section>

  <!-- ずかん -->
  <section id="scr-zukan" class="screen">
    <header class="game-header">
      <button class="back-btn" data-home>← もどる</button>
      <div class="zukan-tabs">
        <button class="ztab active" data-zg="1">１ねんせい</button>
        <button class="ztab" data-zg="2">２ねんせい</button>
        <button class="ztab" data-zg="3">３ねんせい</button>
      </div>
    </header>
    <div class="zukan-grid" id="zukan-grid"></div>
  </section>

  <!-- かんじパズル: 人数えらび -->
  <section id="scr-pzsetup" class="screen">
    <header class="game-header">
      <button class="back-btn" data-home>← もどる</button>
    </header>
    <div class="pzsetup-inner">
      <h2 class="pzsetup-title">🀄 かんじパズル</h2>
      <p class="pzsetup-rules">
        てもちの かんじを ばんに おいて、たて・よこで じゅくごを つくろう！<br />
        できた じゅくごの もじすうが とくてんに なるよ。
      </p>
      <p class="pzsetup-q">ルールを えらんでね</p>
      <div class="grade-chips" id="pz-mode">
        <button class="chip" data-mode="dict">📖 じしょモード</button>
        <button class="chip" data-mode="free">🆓 フリーモード</button>
      </div>
      <p class="pzsetup-modedesc" id="pz-mode-desc"></p>
      <p class="pzsetup-q">なんにんで あそぶ？</p>
      <div class="pzsetup-count" id="pz-count">
        <button class="big-btn primary" data-n="2">👧👦 2にん</button>
        <button class="big-btn primary" data-n="3">👧👦🧒 3にん</button>
        <button class="big-btn primary" data-n="4">👧👦🧒👶 4にん</button>
      </div>
    </div>
  </section>

  <!-- かんじパズル: ゲーム -->
  <section id="scr-puzzle" class="screen">
    <header class="game-header">
      <button class="back-btn" data-home>← もどる</button>
      <div class="progress" id="pz-turninfo"></div>
    </header>
    <div class="pz-scores" id="pz-scores"></div>
    <div class="pz-board" id="pz-board"></div>
    <div class="pz-msg" id="pz-msg"></div>
    <div class="pz-hand" id="pz-hand"></div>
    <div class="pz-actions">
      <button class="big-btn" id="pz-pass">パス（こうかん）</button>
      <button class="big-btn primary" id="pz-swapok" hidden></button>
      <button class="big-btn" id="pz-swapcancel" hidden>やめる</button>
    </div>
    <div class="pz-popup" id="pz-popup"></div>
    <div class="pz-judge" id="pz-judge">
      <div class="pz-judge-box">
        <h3 class="pz-judge-title">じゅくごに なった？</h3>
        <p class="pz-judge-help">ならびを タップして ⭕❌を きめてね</p>
        <div id="pz-judge-runs"></div>
        <div class="pz-judge-sum" id="pz-judge-sum"></div>
        <button class="big-btn primary" id="pz-judge-ok">けってい！</button>
      </div>
    </div>
    <div class="pz-overlay" id="pz-overlay"></div>
  </section>

  <!-- けっか -->
  <section id="scr-result" class="screen">
    <div class="result-inner">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-text" id="result-text"></p>
      <div class="result-stars" id="result-stars"></div>
      <div class="result-buttons">
        <button class="big-btn primary" id="btn-again">もういちど！</button>
        <button class="big-btn" data-home>ホームへ</button>
      </div>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/words.js"></script>
  <script src="js/app.js"></script>
  <script src="js/puzzle.js"></script>
</body>
</html>
